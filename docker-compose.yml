services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - AIRLABS_API_KEY=${AIRLABS_API_KEY}
      - NODE_ENV=production
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flight-ics.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.flight-ics.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}"
      - "traefik.http.routers.flight-ics.tls.certresolver=${TRAEFIK_CERTRESOLVER:-myresolver}"
      - "traefik.http.services.flight-ics.loadbalancer.server.port=3000"
    networks:
      - traefik-network

networks:
  traefik-network:
    external: true
